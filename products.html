<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Products</h1>
    <div id="product-container">
        
        <main class="products" id="main-products">
        </main>

        <aside id="aside-products">
            <h2>Search Filter</h2>

            <h3>Categories</h3>
            <input type="checkbox"> Fashion <br>
            <input type="checkbox"> Electronics <br>
            <input type="checkbox"> Home & Living <br>
            <input type="checkbox"> Beauty & Health <br><br>

            <h3>Shipped From</h3>
            <input type="checkbox"> Laguna <br>
            <input type="checkbox"> Manila <br>
            <input type="checkbox"> Cebu <br>
            <input type="checkbox"> Davao <br>
            <input type="checkbox"> China <br><br>

            <h3>Ratings</h3>
            <input type="radio" name="select">5 Stars <br>
            <input type="radio" name="select">4 Stars & Up <br>
            <input type="radio" name="select">3 Stars & Up <br>
            <input type="radio" name="select">2 Stars & Up <br>
            <input type="radio" name="select">1 Star & Up <br>

        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
